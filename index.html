<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Quality Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .pulse-red { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans">

    <div class="container mx-auto p-6">
        <header class="flex justify-between items-center mb-10 border-b border-slate-700 pb-5">
            <div>
                <h1 class="text-3xl font-bold text-sky-400">PureAir Dashboard</h1>
                <p class="text-slate-400">Real-time Environmental Monitoring</p>
            </div>
            <div id="status-badge" class="px-4 py-2 rounded-full bg-green-500/20 text-green-400 border border-green-500">
                System Active (Simulated)
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
                <h2 class="text-lg font-medium mb-4 text-slate-300">Pollution Level</h2>
                <div class="flex flex-col items-center">
                    <span id="pollution-value" class="text-7xl font-black mb-2">0%</span>
                    <div id="safety-indicator" class="w-full h-3 bg-slate-700 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-green-500 transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div id="warning-card" class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 flex flex-col justify-center items-center text-center">
                <div id="warning-icon" class="mb-4 text-slate-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <h3 id="warning-text" class="text-xl font-bold text-slate-400">Air Quality: Good</h3>
                <p id="action-text" class="text-slate-500 mt-2">No mask required.</p>
            </div>

            <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
                <h2 class="text-lg font-medium mb-4 text-slate-300">Session Data</h2>
                <div class="space-y-4">
                    <div class="flex justify-between"><span>Max Recorded:</span><span id="max-val" class="font-bold">0%</span></div>
                    <div class="flex justify-between"><span>Avg Level:</span><span id="avg-val" class="font-bold text-sky-400">0%</span></div>
                    <div class="flex justify-between"><span>Alert Count:</span><span id="alert-count" class="font-bold text-orange-400">0</span></div>
                </div>
            </div>

        </div>

        <div class="mt-8 bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
            <h2 class="text-lg font-medium mb-4 text-slate-300">Pollution Trend (Last 20 Samples)</h2>
            <canvas id="pollutionChart" height="100"></canvas>
        </div>
    </div>

    <script>
        const pollutionValEl = document.getElementById('pollution-value');
        const progressBar = document.getElementById('progress-bar');
        const warningCard = document.getElementById('warning-card');
        const warningText = document.getElementById('warning-text');
        const actionText = document.getElementById('action-text');
        const warningIcon = document.getElementById('warning-icon');
        
        let history = [];
        let alerts = 0;
        const ctx = document.getElementById('pollutionChart').getContext('2d');

        // Initialize Chart
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(20).fill(''),
                datasets: [{
                    label: 'Pollution %',
                    data: [],
                    borderColor: '#38bdf8',
                    backgroundColor: 'rgba(56, 189, 248, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                scales: { y: { min: 0, max: 100, grid: { color: '#334155' } }, x: { display: false } },
                plugins: { legend: { display: false } }
            }
        });

        function updateDashboard() {
            // SIMULATION: Generate random value (0-100)
            // In reality, you'd fetch this from your sensor API
            const value = Math.floor(Math.random() * 101);
            
            // Update UI
            pollutionValEl.innerText = value + '%';
            progressBar.style.width = value + '%';

            // Logic for Warnings
            if (value > 70) {
                // High Pollution
                warningCard.classList.replace('bg-slate-800', 'bg-red-900/40');
                warningCard.classList.add('border-red-500', 'pulse-red');
                warningText.innerText = "WARNING: HIGH POLLUTION";
                warningText.classList.replace('text-slate-400', 'text-red-400');
                actionText.innerText = "Please wear a mask immediately!";
                actionText.classList.replace('text-slate-500', 'text-red-200');
                warningIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>';
                alerts++;
            } else if (value > 40) {
                // Moderate Pollution
                warningCard.className = "bg-slate-800 p-6 rounded-2xl shadow-xl border border-orange-500 flex flex-col justify-center items-center text-center";
                warningText.innerText = "Air Quality: Moderate";
                warningText.className = "text-xl font-bold text-orange-400";
                actionText.innerText = "Consider a mask if sensitive.";
                actionText.className = "text-slate-400 mt-2";
                warningIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-orange-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>';
            } else {
                // Good Air
                warningCard.className = "bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 flex flex-col justify-center items-center text-center";
                warningText.innerText = "Air Quality: Good";
                warningText.className = "text-xl font-bold text-green-400";
                actionText.innerText = "No mask required.";
                actionText.className = "text-slate-500 mt-2";
                warningIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>';
            }

            // Update Color of progress bar
            progressBar.className = value > 70 ? "h-full bg-red-500 transition-all duration-500" : (value > 40 ? "h-full bg-orange-500 transition-all duration-500" : "h-full bg-green-500 transition-all duration-500");

            // Update Chart Data
            history.push(value);
            if (history.length > 20) history.shift();
            chart.data.datasets[0].data = history;
            chart.update();

            // Update Stats
            document.getElementById('max-val').innerText = Math.max(...history) + '%';
            document.getElementById('avg-val').innerText = Math.round(history.reduce((a,b) => a+b, 0) / history.length) + '%';
            document.getElementById('alert-count').innerText = alerts;
        }

        // Run simulation every 3 seconds
        setInterval(updateDashboard, 3000);
        updateDashboard();
    </script>
</body>
</html>
